<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Make Payment - GOV.UK</title>
    <link rel="stylesheet" href="/css/govstyles.css">
</head>
<body class="govuk-template__body">
<header class="main-header"><div class="header-wrapper"><h1 class="logo"><span></span></h1></div></header>
<main class="content-wrapper govuk-main-wrapper">
    <h1 class="govuk-heading-xl">Check fine details</h1>

    <div class="govuk-inset-text" style="background: #f3f2f1; padding: 20px; border-left: 10px solid #b1b4b6;">
        <p class="govuk-body"><strong>Fine Reference:</strong> <span th:text="${fine.reference}"></span></p>
        <p class="govuk-body"><strong>Full Name:</strong> <span th:text="${fine.full_name}"></span></p>
        <p class="govuk-body"><strong>Total Fine Amount:</strong> <span th:text="'£' + ${totalAmount}"></span></p>
        <p class="govuk-body"><strong>Outstanding Balance:</strong> <span style="color: #d4351c; font-weight: bold;" th:text="'£' + ${outstanding}"></span></p>
    </div>

    <form th:action="@{/submit-payment}" method="post">
        <input type="hidden" name="fineId" th:value="${fine.id}">
        <div class="govuk-form-group">
            <label class="govuk-label" for="amountPaid">Amount to pay (£)</label>
            <div id="hint" class="govuk-hint">Enter an amount up to <span th:text="'£' + ${outstanding}"></span></div>
            <input class="govuk-input" id="amountPaid" name="amountPaid"
                   type="number" step="0.01" min="0.30"
                   th:max="${outstanding}" value=""
                   placeholder="0.00" required>
        </div>
        <button type="submit" class="govuk-button" style="background-color: #00703c;">Continue to payment</button>
    </form>
</main>
</body>
</html>

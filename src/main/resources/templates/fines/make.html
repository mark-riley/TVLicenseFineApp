<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Make Payment - GOV.UK</title>
    <link rel="stylesheet" th:href="@{/css/govstyles.css}">
</head>
<body>
<header class="main-header">
    <div class="header-wrapper"><h1 style="color:white; margin:0;">GOV.UK</h1></div>
</header>

<main class="content-wrapper">
    <h1>Fine details</h1>

    <div class="govuk-inset-text">
        <p><strong>Reference:</strong> <span th:text="${fine.reference}"></span></p>
        <p><strong>Name:</strong> <span th:text="${fine.full_name}"></span></p>
        <p><strong>Total Amount:</strong> <span th:text="'£' + ${totalAmount}"></span></p>
        <p><strong>Outstanding:</strong> <span style="color: #d4351c; font-weight: bold;" th:text="'£' + ${outstanding}"></span></p>
    </div>

    <form th:action="@{/submit-payment}" method="post">
        <input type="hidden" name="fineId" th:value="${fine.id}">

        <div class="govuk-form-group">
            <label class="govuk-label" for="amountPaid">Amount to pay (£)</label>
            <span class="govuk-hint">Enter an amount up to <span th:text="'£' + ${outstanding}"></span></span>
            <input class="govuk-input" id="amountPaid" name="amountPaid" type="number" step="0.01" required>
        </div>

        <button type="submit" class="govuk-button">Continue to payment</button>
    </form>

    <p style="margin-top: 30px;"><a href="/" style="color: #1d70b8;">Cancel and go back</a></p>
</main>
</body>
</html>

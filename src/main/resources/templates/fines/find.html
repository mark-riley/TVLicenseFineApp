<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Find Fine - GOV.UK</title>
    <link rel="stylesheet" href="/css/govstyles.css">
</head>
<body class="govuk-template__body">
<header class="main-header"><div class="header-wrapper"><h1 class="logo"><span></span></h1></div></header>
<div th:if="${toast}" id="toast-message" style="background-color: #1d70b8; color: white; padding: 15px; margin-bottom: 20px; border-radius: 4px; font-weight: bold; position: relative;">
    <span th:text="${toast}"></span>
    <button onclick="this.parentElement.style.display='none'" style="float: right; background: none; border: none; color: white; cursor: pointer;">&times;</button>
</div>
<main class="content-wrapper govuk-main-wrapper">
    <h1 class="govuk-heading-xl">Find your fine details</h1>
    <div th:if="${error}" style="color: #d4351c; font-weight: bold; margin-bottom: 20px;" th:text="${error}"></div>
    <form action="/find-fine" method="post">
        <div class="govuk-form-group">
            <label class="govuk-label govuk-label--m">Reference ID</label>
            <input class="govuk-input" name="reference" type="text" required>
        </div>
        <div class="govuk-form-group">
            <label class="govuk-label govuk-label--m">Postcode</label>
            <input class="govuk-input" name="postcode" type="text" required>
        </div>
        <button type="submit" class="govuk-button">Search</button>
    </form>
</main>
</body>
</html>

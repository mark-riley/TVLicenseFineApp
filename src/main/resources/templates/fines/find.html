<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Find your fine - GOV.UK</title>
    <link rel="stylesheet" th:href="@{/css/govstyles.css}">
</head>
<body>
<header class="main-header">
    <div class="header-wrapper">
        <h1 style="color:white; margin:0;">GOV.UK</h1>
        <div id="google_translate_element" style="float:right;"></div>
    </div>
</header>

<main class="content-wrapper">
    <h1>Find your fine</h1>
    <p class="govuk-body">Enter your details to view your outstanding TV license fine and make a payment.</p>

    <div th:if="${error}" class="govuk-error-summary">
        <p th:text="${error}"></p>
    </div>

    <div th:if="${toast}" class="govuk-inset-text" style="border-color: #00703c;">
        <p th:text="${toast}"></p>
    </div>

    <form th:action="@{/find-fine}" method="post">
        <div class="govuk-form-group">
            <label class="govuk-label" for="reference">Fine reference number</label>
            <span class="govuk-hint">Example: 'TVL-XXXX-XXX'</span>
            <input class="govuk-input" id="reference" name="reference" type="text" required>
        </div>

        <div class="govuk-form-group">
            <label class="govuk-label" for="postcode">Postcode</label>
            <span class="govuk-hint">Example: 'BTX XXX'</span>
            <input class="govuk-input" id="postcode" name="postcode" type="text" required>
        </div>

        <button type="submit" class="govuk-button">Continue</button>
    </form>
</main>
<script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }
</script>
<script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>

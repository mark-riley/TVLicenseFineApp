<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Payment Confirmation - GOV.UK</title>
    <link rel="stylesheet" th:href="@{/css/govstyles.css}">
</head>
<body>
<header class="main-header">
    <div class="header-wrapper"><h1 style="color:white; margin:0;">GOV.UK</h1></div>
</header>

<main class="content-wrapper">
    <div class="govuk-panel--confirmation">
        <h1 class="govuk-panel__title">Payment complete</h1>
        <div class="govuk-panel__body">
            Your transaction ID:<br>
            <strong th:text="${transactionId}"></strong>
        </div>
    </div>

    <h2>Payment Summary</h2>

    <div class="govuk-summary-list">
        <div class="govuk-summary-list__row">
            <div class="govuk-summary-list__key">Fine reference</div>
            <div class="govuk-summary-list__value" th:text="${fine.reference}"></div>
        </div>
        <div class="govuk-summary-list__row">
            <div class="govuk-summary-list__key">Amount paid</div>
            <div class="govuk-summary-list__value" th:text="'£' + ${amountPaid}"></div>
        </div>
        <div class="govuk-summary-list__row">
            <div class="govuk-summary-list__key">Balance remaining</div>
            <div class="govuk-summary-list__value" th:text="'£' + ${remaining}"></div>
        </div>
        <div class="govuk-summary-list__row">
            <div class="govuk-summary-list__key">Date</div>
            <div class="govuk-summary-list__value" th:text="${#temporals.format(#temporals.createNow(), 'd MMMM yyyy HH:mm')}"></div>
        </div>
    </div>

    <a th:href="@{/download-receipt(transactionId=${transactionId})}" class="govuk-button">
        Download PDF Receipt
    </a>

    <p style="margin-top: 40px;">
        <a href="/" style="color: #1d70b8;">Return to home</a>
    </p>
</main>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Confirmation</title>
    <link rel="stylesheet" href="/css/govstyles.css" />
</head>
<body class="govuk-template__body">

<header class="main-header">
    <div class="header-wrapper"><h1 class="logo"><span></span></h1></div>
</header>

<main class="content-wrapper govuk-main-wrapper">
    <section class="receipt-card">

        <div class="govuk-panel govuk-panel--confirmation" style="background-color: #00703c; color: white; padding: 20px; text-align: center; margin-bottom: 30px;">
            <h1 class="govuk-panel__title" style="color: white; margin: 0;">Payment complete</h1>
        </div>

        <h2 class="govuk-heading-m">Transaction ID: <span id="transaction-id" th:text="${transactionId}">#000-0000-000</span></h2>

        <p class="govuk-body" th:if="${fine}">
            Your payment for reference <strong th:text="${fine.reference}"></strong> has been successfully processed.
        </p>

        <hr class="divider" />

        <div class="data-grid" style="margin-bottom: 30px;">
            <div class="data-row">
                <span class="label">Amount Paid:</span>
                <strong id="amount-paid" class="value accent" th:text="'£' + ${amountPaid}">£0.00</strong>
            </div>
            <div class="data-row">
                <span class="label">Payment Status:</span>
                <strong id="payment-status" class="value status-text" style="color: green;">Paid</strong>
            </div>
        </div>

        <div class="actions">
            <a href="/" class="govuk-button">Return to main menu</a>
        </div>
    </section>
</main>

<footer class="main-footer"></footer>
</body>
</html>

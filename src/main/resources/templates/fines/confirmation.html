<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment Confirmation</title>
    <link rel="stylesheet" href="/css/govstyles.css" />
</head>
<body>

<header class="main-header">
    <h1 class="logo"><span></span></h1>
    <button class="acc-btn">Accessibility Settings</button>
</header>

<main class="content-wrapper">
    <section class="receipt-card">
        <div class="status-badge">Success</div>
        <h2 class="transaction-title">Transaction ID: <span id="transaction-id">#000-0000-000</span></h2>
        <p class="helper-text">If you have provided an email you should receive one shortly</p>

        <hr class="divider" />

        <div class="data-grid">
            <div class="data-row">
                <span class="label">Amount Paid</span>
                <span id="amount-paid" class="value accent">£0.00</span>
            </div>
            <div class="data-row">
                <span class="label">Amount Remaining</span>
                <span id="amount-remaining" class="value">£0.00</span>
            </div>
            <div class="data-row">
                <span class="label">Payment Status</span>
                <span id="payment-status" class="value status-text">Pending</span>
            </div>
        </div>

        <div class="actions">
            <a href="#" class="btn-download">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4M7 10l5 5 5-5M12 15V3"/></svg>

                Download PDF Receipt
            </a>
        </div>
    </section>
</main>

<footer class="main-footer">
    <p>&copy; 2026 Secure Payments Inc. | All Rights Reserved</p>
</footer>

<script src="/js/script.js"></script>
</body>
</html>
